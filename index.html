<!DOCTYPE html>
<html>
<head>
  <title>For Rissa 💖</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
      background: #ffe6f0;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 18px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }

    #yes {
      background-color: #ff4d88;
      color: white;
    }

    #no {
      background-color: #ccc;
      position: absolute;
    }
  </style>
</head>

<body onclick="playMusic()">

<h1>Rissa... 💖</h1>
<h1>So... are we going on a date tonight or what? 😉</h1>
<p>I promise it'll be worth it 😌</p>

<button id="yes" onclick="sayYes()">Obviously yes 😍</button>
<button id="no" onmouseover="moveNo()" onclick="moveNo()">No 😢</button>

<!-- 🎵 MUSIC -->
<script>
  function playMusic() {
    let iframe = document.createElement("iframe");
    iframe.src = "https://www.youtube.com/embed/v45F0YesdZM?autoplay=1&loop=1&playlist=v45F0YesdZM";
    iframe.style.display = "none";
    document.body.appendChild(iframe);
  }
</script>

<!-- 😈 CHAOTIC NO BUTTON -->
<script>
  let messages = [
    "Rissa… are you sure? 😢",
    "Think again, please 🥺",
    "Don't do this to me 😭",
    "I was planning something nice 💐",
    "I'll treat you, I swear 🥲",
    "You're really saying no to me? 😔",
    "Okay… now I'm sad 💔",
    "Fine... I’ll wait for your yes 😌"
  ];

  let count = 0;

  function sayYes() {
    document.body.innerHTML = `
      <h1>I knew it 😏💖</h1>
      <p>Pick you up at 7? 😉</p>
    `;
  }

  function moveNo() {
    let noBtn = document.getElementById("no");

    if (count < messages.length) {
      noBtn.innerText = messages[count];
      count++;
    }

    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    let scale = 1 - count * 0.1;
    noBtn.style.transform = "scale(" + scale + ")";

    if (count >= messages.length) {
      noBtn.style.display = "none";
    }
  }
</script>

</body>
</html>
