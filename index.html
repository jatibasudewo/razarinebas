<!DOCTYPE html>
<html>
<head>
  <title>For Rissa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffe6f0;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 42px;
      animation: fadeIn 1.5s ease-in-out;
    }

    p {
      font-size: 22px;
      margin-top: 20px;
      animation: fadeIn 2.5s ease-in-out;
    }

    .buttons {
      margin-top: 30px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      transition: 0.2s;
    }

    #yes {
      background-color: #ff4d88;
      color: white;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      background-color: #ccc;
      position: absolute;
    }

    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body onclick="startEverything()">

<div class="container">
  <h1>Hi Rissa… it’s Bas</h1>

  <p>
    I miss you… like a lot 🥺<br><br>
    I was thinking about you, and I just—<br>
    wanna take you out tonight.<br><br>
    What do you say?
  </p>

  <div class="buttons">
    <button id="yes" onclick="sayYes()">Yes 😍</button>
    <button id="no" onmouseover="moveNo()" onclick="moveNo()">No 😢</button>
  </div>
</div>

<script>
let started = false;
let audio;

function startEverything() {
  if (started) return;
  started = true;

  audio = document.createElement("audio");
  audio.src = "song.mp3";
  audio.loop = true;
  audio.play();

  document.body.appendChild(audio);
}

function sayYes() {
  document.body.innerHTML = `
    <div style="text-align:center; margin-top: 80px;">
      
      <h1 style="margin-bottom: 5px;">I knew it 😏</h1>
      
      <p id="nextText" style="margin-top: 30px; opacity: 0; transition: 1s;">
        I’ll make tonight special… just for you 💖
      </p>

    </div>
  `;

  startHearts();

  // ✨ delayed text reveal (nice emotional effect)
  setTimeout(() => {
    document.getElementById("nextText").style.opacity = 1;
  }, 800);

  let phone = "6282180000621";
  let message = "Okay… I’ll go on a date with you tonight 😌";
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  setTimeout(() => {
    window.open(url, "_blank");
  }, 2000);
}

let messages = [
  "Rissa… really? 😢",
  "Come on… don’t do this 🥺",
  "At least think about it 💭",
  "I had something planned… 💐",
  "You might actually like it 😌",
  "Okay now I’m just sad 💔"
];

let count = 0;

function moveNo() {
  let noBtn = document.getElementById("no");

  if (count < messages.length) {
    noBtn.innerText = messages[count];
    count++;
  }

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>

</body>
</html>
