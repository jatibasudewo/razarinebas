<!DOCTYPE html>
<html>
<head>
  <title>For Rissa</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
      background: #ffe6f0;
      overflow: hidden;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 18px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }

    #yes {
      background-color: #ff4d88;
      color: white;
    }

    #no {
      background-color: #ccc;
      position: absolute;
    }

    .heart {
      position: fixed;
      bottom: -10px;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }
  </style>
</head>

<body onclick="startEverything()">

<h1 id="text"></h1>
<p id="subtext"></p>

<button id="yes" onclick="sayYes()">Obviously yes 😍</button>
<button id="no" onmouseover="moveNo()" onclick="moveNo()">No 😢</button>

<!-- 🎬 START EVERYTHING (music + typing) -->
<script>
let started = false;

function startEverything() {
  if (started) return;
  started = true;

  // 🎵 MUSIC
  let iframe = document.createElement("iframe");
  iframe.src = "https://www.youtube.com/embed/v45F0YesdZM?autoplay=1&loop=1&playlist=v45F0YesdZM";
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  // ✨ START TYPING
  typeText();
}
</script>

<!-- ✨ TYPING -->
<script>
let text = "Rissa...";
let text2 = "So... are we going on a date tonight or what? 😉";

let i = 0;
let j = 0;

function typeText() {
  if (i < text.length) {
    document.getElementById("text").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 80);
  } else {
    setTimeout(typeText2, 500);
  }
}

function typeText2() {
  if (j < text2.length) {
    document.getElementById("subtext").innerHTML += text2.charAt(j);
    j++;
    setTimeout(typeText2, 50);
  }
}
</script>

<!-- 😈 NO BUTTON -->
<script>
let messages = [
  "Rissa… are you sure? 😢",
  "Think again please 🥺",
  "Don't do this to me 😭",
  "I had something planned for us 💐",
  "I’ll make it worth it 😌",
  "You’re really saying no? 😔",
  "Okay… now I'm sad 💔",
  "Fine... I’ll wait for your yes 😏"
];

let count = 0;

function sayYes() {
  document.body.innerHTML = `
    <h1>I knew it 😏</h1>
    <p>Let’s meet somewhere tonight… I’ll make it special for you 😌💖</p>
  `;

  startHearts();

  // 📱 WhatsApp
  let phone = "6281180002349";
  let message = "Okay… I’ll go on a date with you tonight 😌";
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);

  setTimeout(() => {
    window.open(url, "_blank");
  }, 1500);
}

function moveNo() {
  let noBtn = document.getElementById("no");

  if (count < messages.length) {
    noBtn.innerText = messages[count];
    count++;
  }

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  let scale = 1 - count * 0.1;
  noBtn.style.transform = "scale(" + scale + ")";

  if (count >= messages.length) {
    noBtn.style.display = "none";
  }
}
</script>

<!-- 💖 HEARTS -->
<script>
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
